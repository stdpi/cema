name: xcaddy

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy with CEMA
        run: |
          mkdir -p dist
          xcaddy build \
            --output ./dist/caddy \
            --with github.com/stdpi/cema=.

      - name: Smoke test binary
        run: ./dist/caddy list-modules | grep -E '(^cema$|tls.get_certificate.cema|http.handlers.cema_api|http.handlers.cema_challenge)'
